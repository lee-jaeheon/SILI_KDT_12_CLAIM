<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCR 백엔드 진단</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0b0b0b;
            --surface: #141414;
            --surface2: #1a1a1a;
            --border: #252525;
            --border-bright: #333;
            --amber: #f59e0b;
            --amber-soft: rgba(245,158,11,0.1);
            --amber-border: rgba(245,158,11,0.25);
            --green: #4ade80;
            --green-soft: rgba(74,222,128,0.1);
            --red: #f87171;
            --red-soft: rgba(248,113,113,0.1);
            --text: #c4c4c4;
            --text-dim: #636363;
            --text-bright: #f0f0f0;
            --mono: 'DM Mono', 'Courier New', monospace;
            --display: 'Bebas Neue', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.6;
            min-height: 100vh;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.025) 1px, transparent 0);
            background-size: 28px 28px;
        }

        /* ── HEADER ─────────────────────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(11,11,11,0.92);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--display);
            font-size: 26px;
            letter-spacing: 3px;
            color: var(--amber);
            line-height: 1;
        }

        .logo-sep {
            width: 1px;
            height: 20px;
            background: var(--border-bright);
        }

        .logo-sub {
            color: var(--text-dim);
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .header-spacer { flex: 1; }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 5px var(--green);
            animation: blink 2.4s ease-in-out infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── CONTAINER ──────────────────────────────────────────────────────── */
        .container {
            max-width: 1160px;
            margin: 0 auto;
            padding: 28px 28px 60px;
        }

        /* ── TABS ───────────────────────────────────────────────────────────── */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 11px 22px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color .2s, border-color .2s;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── LAYOUT ─────────────────────────────────────────────────────────── */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .col { display: flex; flex-direction: column; gap: 20px; }

        /* ── PANEL ──────────────────────────────────────────────────────────── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 3px;
            overflow: hidden;
            flex: 1;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .panel-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            color: var(--text-dim);
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 2px;
            background: var(--amber-soft);
            color: var(--amber);
            border: 1px solid var(--amber-border);
            letter-spacing: 0.06em;
        }

        .badge-green {
            background: var(--green-soft);
            color: var(--green);
            border-color: rgba(74,222,128,.25);
        }

        .badge-red {
            background: var(--red-soft);
            color: var(--red);
            border-color: rgba(248,113,113,.25);
        }

        .panel-body { padding: 18px; }

        /* ── UPLOAD ZONE ────────────────────────────────────────────────────── */
        .upload-zone {
            border: 1px dashed var(--border-bright);
            border-radius: 3px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--amber);
            background: var(--amber-soft);
        }
        .upload-zone input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer;
        }
        .upload-icon { font-size: 26px; margin-bottom: 10px; opacity: .35; display: block; }
        .upload-label { display: block; color: var(--text-dim); font-size: 12px; margin-bottom: 3px; }
        .upload-hint  { font-size: 10px; color: var(--text-dim); opacity: .5; }
        .upload-name  { margin-top: 10px; font-size: 11px; color: var(--amber); word-break: break-all; }

        /* ── IMAGE PREVIEW ──────────────────────────────────────────────────── */
        .preview-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .preview-box img { max-width: 100%; max-height: 220px; object-fit: contain; display: none; }
        .preview-placeholder { font-size: 11px; color: var(--text-dim); text-align: center; padding: 24px; }

        /* ── BUTTON ─────────────────────────────────────────────────────────── */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 9px 18px;
            background: var(--amber);
            color: #000;
            border: none;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: opacity .2s;
        }
        .btn:hover:not(:disabled) { opacity: .82; }
        .btn:disabled { opacity: .3; cursor: not-allowed; }

        /* ── OUTPUT TEXT ────────────────────────────────────────────────────── */
        .output-text {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 12px 14px;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.75;
            max-height: 148px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ── RESULT ─────────────────────────────────────────────────────────── */
        .result-empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
            font-size: 12px;
            line-height: 2;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 9px 0;
            border-bottom: 1px solid var(--border);
        }
        .result-row:last-child { border-bottom: none; }
        .result-key { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); }
        .result-val { font-size: 12px; color: var(--text-bright); text-align: right; max-width: 58%; }

        .tag-defect {
            display: inline-block;
            padding: 2px 9px;
            background: var(--amber-soft);
            color: var(--amber);
            border: 1px solid var(--amber-border);
            border-radius: 2px;
            font-size: 11px;
        }

        .conf-row { display: flex; align-items: center; gap: 10px; }
        .conf-track { flex:1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .conf-fill  { height: 100%; background: var(--amber); border-radius: 2px; transition: width .7s ease; }
        .conf-pct   { font-size: 12px; color: var(--amber); min-width: 36px; text-align: right; }

        .notice {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 14px;
            padding: 9px 12px;
            border-radius: 2px;
            font-size: 11px;
            line-height: 1.5;
        }
        .notice-warn { background: rgba(245,158,11,.07); border: 1px solid rgba(245,158,11,.2); color: var(--amber); }
        .notice-red  { background: var(--red-soft); border: 1px solid rgba(248,113,113,.2); color: var(--red); }

        .similar-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
        .similar-item:last-child { border-bottom: none; }
        .similar-doc  { font-size: 11px; color: var(--amber); margin-bottom: 3px; }
        .similar-info { font-size: 11px; color: var(--text-dim); }

        /* ── FORM ───────────────────────────────────────────────────────────── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field.full { grid-column: 1 / -1; }

        .field-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-dim);
        }
        .field-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 7px 11px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-bright);
            outline: none;
            transition: border-color .2s;
            width: 100%;
        }
        .field-input:focus { border-color: var(--amber); }
        .field-input.filled { border-color: rgba(74,222,128,.5); color: var(--green); }
        textarea.field-input { resize: vertical; min-height: 68px; }

        /* ── STEP ───────────────────────────────────────────────────────────── */
        .steps {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .step-num {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 1px solid var(--border-bright);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
            color: var(--text-dim);
            flex-shrink: 0;
            transition: all .2s;
        }
        .step-num.done   { background: var(--green); border-color: var(--green); color: #000; }
        .step-num.active { border-color: var(--amber); color: var(--amber); }
        .step-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; }
        .step-arrow { color: var(--border-bright); font-size: 12px; }

        /* ── SPACER ─────────────────────────────────────────────────────────── */
        .sp { height: 16px; }

        /* ── SPINNER ────────────────────────────────────────────────────────── */
        .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid rgba(0,0,0,.25);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin .55s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── TOAST ──────────────────────────────────────────────────────────── */
        #toast-wrap {
            position: fixed;
            bottom: 22px; right: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 999;
        }
        .toast {
            padding: 10px 18px;
            border-left: 3px solid var(--green);
            background: var(--surface);
            border-radius: 0 2px 2px 0;
            font-size: 12px;
            color: var(--text-bright);
            animation: toastIn .18s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,.5);
        }
        .toast.err  { border-left-color: var(--red); }
        .toast.warn { border-left-color: var(--amber); }
        @keyframes toastIn { from{transform:translateX(12px);opacity:0} to{transform:translateX(0);opacity:1} }

        /* ── SCROLLBAR ──────────────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <span class="logo">QCR</span>
    <div class="logo-sep"></div>
    <span class="logo-sub">백엔드 진단 도구</span>
    <div class="header-spacer"></div>
    <div class="status-pill"><span class="dot"></span>localhost:8000</div>
</header>

<div class="container">

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="classify">이미지 분류 테스트</button>
        <button class="tab-btn" data-tab="parse">파일 파싱 → 자동입력 테스트</button>
    </div>

    <!-- ════════════════════ TAB 1: 이미지 분류 ════════════════════ -->
    <div class="tab-panel active" id="tab-classify">
        <div class="grid-2">

            <!-- 왼쪽 -->
            <div class="col">
                <div class="panel">
                    <div class="panel-head">
                        <span class="panel-title">불량 이미지 업로드</span>
                        <span class="badge">POST /api/classify</span>
                    </div>
                    <div class="panel-body">
                        <div class="upload-zone" id="img-zone">
                            <input type="file" id="img-input" accept="image/*">
                            <span class="upload-icon">◈</span>
                            <span class="upload-label">이미지 드롭 또는 클릭</span>
                            <span class="upload-hint">JPG · PNG · WEBP · BMP</span>
                            <div class="upload-name" id="img-name"></div>
                        </div>
                        <div class="sp"></div>
                        <div class="preview-box">
                            <img id="img-preview" alt="미리보기">
                            <div class="preview-placeholder" id="img-ph">이미지를 선택하면<br>미리보기가 표시됩니다</div>
                        </div>
                        <div class="sp"></div>
                        <button class="btn" id="btn-classify" disabled>분류 실행</button>
                    </div>
                </div>
            </div>

            <!-- 오른쪽 -->
            <div class="col">
                <div class="panel" style="flex:1">
                    <div class="panel-head">
                        <span class="panel-title">분류 결과</span>
                        <span id="classify-badge" class="badge" style="display:none"></span>
                    </div>
                    <div class="panel-body" id="classify-result">
                        <div class="result-empty">이미지를 업로드하고<br>분류를 실행하세요</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ════════════════════ TAB 2: 파일 파싱 ════════════════════ -->
    <div class="tab-panel" id="tab-parse">

        <!-- 단계 표시 -->
        <div class="steps">
            <div class="step-num active" id="s1">1</div>
            <span class="step-label">파일 선택</span>
            <span class="step-arrow">›</span>
            <div class="step-num" id="s2">2</div>
            <span class="step-label">텍스트 추출</span>
            <span class="step-arrow">›</span>
            <div class="step-num" id="s3">3</div>
            <span class="step-label">AI 파싱</span>
            <span class="step-arrow">›</span>
            <div class="step-num" id="s4">4</div>
            <span class="step-label">폼 자동입력</span>
        </div>

        <div class="grid-2">

            <!-- 왼쪽 -->
            <div class="col">
                <div class="panel">
                    <div class="panel-head">
                        <span class="panel-title">파일 업로드</span>
                        <span class="badge">POST /api/parse-file</span>
                    </div>
                    <div class="panel-body">
                        <div class="upload-zone" id="file-zone">
                            <input type="file" id="file-input" accept=".pdf,.docx,.eml">
                            <span class="upload-icon">◈</span>
                            <span class="upload-label">파일 드롭 또는 클릭</span>
                            <span class="upload-hint">PDF · DOCX · EML</span>
                            <div class="upload-name" id="file-name"></div>
                        </div>
                        <div class="sp"></div>
                        <button class="btn" id="btn-parse-file" disabled>텍스트 추출</button>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-head">
                        <span class="panel-title">추출된 텍스트</span>
                        <span class="badge">POST /api/parse-claim</span>
                    </div>
                    <div class="panel-body">
                        <div class="output-text" id="extracted-text">— 추출 대기 중 —</div>
                        <div class="sp"></div>
                        <button class="btn" id="btn-parse-claim" disabled>AI 파싱 → 폼 자동입력</button>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 자동입력 폼 -->
            <div class="col">
                <div class="panel" style="flex:1">
                    <div class="panel-head">
                        <span class="panel-title">자동 입력 결과</span>
                        <span class="badge" id="fields-count">—</span>
                    </div>
                    <div class="panel-body">
                        <div class="form-grid">
                            <div class="field">
                                <label class="field-label">고객사</label>
                                <input class="field-input" id="f-customer" readonly placeholder="—">
                            </div>
                            <div class="field">
                                <label class="field-label">품명</label>
                                <input class="field-input" id="f-product" readonly placeholder="—">
                            </div>
                            <div class="field">
                                <label class="field-label">불량 유형</label>
                                <input class="field-input" id="f-defect" readonly placeholder="—">
                            </div>
                            <div class="field">
                                <label class="field-label">담당자</label>
                                <input class="field-input" id="f-handler" readonly placeholder="—">
                            </div>
                            <div class="field">
                                <label class="field-label">납품 수량</label>
                                <input class="field-input" id="f-dqty" readonly placeholder="—">
                            </div>
                            <div class="field">
                                <label class="field-label">불량 수량</label>
                                <input class="field-input" id="f-qty" readonly placeholder="—">
                            </div>
                            <div class="field full">
                                <label class="field-label">원인 분석</label>
                                <textarea class="field-input" id="f-cause" readonly placeholder="—"></textarea>
                            </div>
                            <div class="field full">
                                <label class="field-label">시정 조치</label>
                                <textarea class="field-input" id="f-corrective" readonly placeholder="—"></textarea>
                            </div>
                            <div class="field full">
                                <label class="field-label">재발 방지</label>
                                <textarea class="field-input" id="f-preventive" readonly placeholder="—"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<div id="toast-wrap"></div>

<script>
const LABELS = {
    OUTER_DAMAGE: '외관 손상',
    SEALING:      '실링 불량',
    HEMMING:      '헤밍 불량',
    HOLE_DEFORM:  '홀 변형',
};

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
});

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
    const el = document.createElement('div');
    el.className = 'toast' + (type === 'err' ? ' err' : type === 'warn' ? ' warn' : '');
    el.textContent = msg;
    document.getElementById('toast-wrap').appendChild(el);
    setTimeout(() => el.remove(), 3200);
}

// ── 버튼 로딩 ─────────────────────────────────────────────────────────────────
function setLoading(btn, on) {
    if (on) {
        btn.disabled = true;
        btn._orig = btn.innerHTML;
        btn.innerHTML = '<span class="spinner"></span> 처리 중...';
    } else {
        btn.disabled = false;
        btn.innerHTML = btn._orig;
    }
}

// ══════════════════════════════════════════════════════════════════════════════
// 이미지 분류
// ══════════════════════════════════════════════════════════════════════════════
let imgFile = null;

const imgInput   = document.getElementById('img-input');
const imgZone    = document.getElementById('img-zone');
const imgPreview = document.getElementById('img-preview');
const imgPh      = document.getElementById('img-ph');
const imgName    = document.getElementById('img-name');
const btnClassify = document.getElementById('btn-classify');

function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) { toast('이미지 파일만 지원합니다.', 'err'); return; }
    imgFile = file;
    imgName.textContent = file.name;
    imgPreview.src = URL.createObjectURL(file);
    imgPreview.style.display = 'block';
    imgPh.style.display = 'none';
    btnClassify.disabled = false;
}

imgInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
imgZone.addEventListener('dragover',  e => { e.preventDefault(); imgZone.classList.add('drag-over'); });
imgZone.addEventListener('dragleave', () => imgZone.classList.remove('drag-over'));
imgZone.addEventListener('drop', e => {
    e.preventDefault(); imgZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

btnClassify.addEventListener('click', async () => {
    if (!imgFile) return;
    setLoading(btnClassify, true);
    try {
        const fd = new FormData();
        fd.append('image', imgFile);
        const res = await fetch('/api/classify', { method: 'POST', body: fd });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        renderClassify(await res.json());
        toast('분류 완료');
    } catch (e) {
        toast('분류 실패: ' + e.message, 'err');
    } finally {
        setLoading(btnClassify, false);
    }
});

function renderClassify(d) {
    const badge = document.getElementById('classify-badge');
    const isDummy = d.is_dummy;
    badge.style.display = '';
    badge.textContent = isDummy ? '더미 모드' : '모델 추론';
    badge.className = 'badge ' + (isDummy ? 'badge-red' : 'badge-green');

    const conf = Math.round((d.confidence || 0) * 100);
    const similar = d.similar_cases || [];

    let html = `
        <div class="result-row">
            <span class="result-key">불량 코드</span>
            <span class="result-val"><span class="tag-defect">${d.defect_type}</span></span>
        </div>
        <div class="result-row">
            <span class="result-key">불량 유형</span>
            <span class="result-val">${LABELS[d.defect_type] || d.defect_type}</span>
        </div>
        <div class="result-row">
            <span class="result-key">신뢰도</span>
            <span class="result-val" style="width:55%">
                <div class="conf-row">
                    <div class="conf-track"><div class="conf-fill" style="width:${conf}%"></div></div>
                    <span class="conf-pct">${conf}%</span>
                </div>
            </span>
        </div>`;

    if (isDummy) {
        html += `<div class="notice notice-red">⚠ 모델 파일 없음 — 랜덤 더미 결과입니다.<br>models/best_model.pth 를 추가하면 실제 추론이 동작합니다.</div>`;
    }

    if (similar.length) {
        html += `<div style="margin-top:18px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:6px">유사 사례 ${similar.length}건</div>`;
        similar.forEach(c => {
            html += `<div class="similar-item">
                <div class="similar-doc">${c.document_no || '—'}</div>
                <div class="similar-info">${c.customer_name || '—'} · ${LABELS[c.defect_type] || c.defect_type}</div>
            </div>`;
        });
    } else {
        html += `<div class="notice notice-warn" style="margin-top:14px">유사 사례 없음 — 승인(approved) 상태 보고서가 없으면 검색 결과가 비어 있습니다.</div>`;
    }

    document.getElementById('classify-result').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════════════
// 파일 파싱
// ══════════════════════════════════════════════════════════════════════════════
let docFile = null;
let parsedText = '';

const fileInput    = document.getElementById('file-input');
const fileZone     = document.getElementById('file-zone');
const fileName     = document.getElementById('file-name');
const btnParseFile = document.getElementById('btn-parse-file');
const btnParseClaim = document.getElementById('btn-parse-claim');
const extractedEl  = document.getElementById('extracted-text');

function setStep(n) {
    for (let i = 1; i <= 4; i++) {
        const el = document.getElementById('s' + i);
        el.classList.remove('done', 'active');
        if (i < n)      { el.classList.add('done');   el.textContent = '✓'; }
        else if (i === n){ el.classList.add('active'); el.textContent = i; }
        else              { el.textContent = i; }
    }
}

function loadDoc(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pdf','docx','eml'].includes(ext)) { toast('PDF, DOCX, EML 파일만 지원합니다.', 'err'); return; }
    docFile = file;
    fileName.textContent = file.name;
    btnParseFile.disabled = false;
    setStep(1);
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) loadDoc(e.target.files[0]); });
fileZone.addEventListener('dragover',  e => { e.preventDefault(); fileZone.classList.add('drag-over'); });
fileZone.addEventListener('dragleave', () => fileZone.classList.remove('drag-over'));
fileZone.addEventListener('drop', e => {
    e.preventDefault(); fileZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) loadDoc(e.dataTransfer.files[0]);
});

btnParseFile.addEventListener('click', async () => {
    if (!docFile) return;
    setLoading(btnParseFile, true);
    setStep(2);
    try {
        const fd = new FormData();
        fd.append('file', docFile);
        const res = await fetch('/api/parse-file', { method: 'POST', body: fd });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'HTTP ' + res.status); }
        const data = await res.json();
        parsedText = data.extracted_text || '';
        extractedEl.textContent = parsedText || '(텍스트 없음)';
        btnParseClaim.disabled = !parsedText;
        setStep(3);
        toast('텍스트 추출 완료 — ' + parsedText.length + '자');
    } catch (e) {
        toast('추출 실패: ' + e.message, 'err');
        setStep(1);
    } finally {
        setLoading(btnParseFile, false);
    }
});

btnParseClaim.addEventListener('click', async () => {
    if (!parsedText) return;
    setLoading(btnParseClaim, true);
    setStep(3);
    try {
        const fd = new FormData();
        fd.append('text', parsedText);
        const res = await fetch('/api/parse-claim', { method: 'POST', body: fd });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'HTTP ' + res.status); }
        fillForm(await res.json());
        setStep(4);
        toast('폼 자동입력 완료');
    } catch (e) {
        toast('파싱 실패: ' + e.message, 'err');
    } finally {
        setLoading(btnParseClaim, false);
    }
});

function fillForm(d) {
    const map = {
        'f-customer':  d.customer_name,
        'f-product':   d.product_name,
        'f-defect':    d.defect_type ? `${d.defect_type}  (${LABELS[d.defect_type] || ''})` : null,
        'f-handler':   d.handler,
        'f-dqty':      d.delivery_quantity,
        'f-qty':       d.defect_quantity,
        'f-cause':     d.root_cause_analysis,
        'f-corrective':d.corrective_action,
        'f-preventive':d.preventive_action,
    };
    let filled = 0;
    for (const [id, val] of Object.entries(map)) {
        const el = document.getElementById(id);
        if (!el) continue;
        if (val != null && val !== '') {
            el.value = val;
            el.classList.add('filled');
            filled++;
        } else {
            el.value = '';
            el.classList.remove('filled');
        }
    }
    document.getElementById('fields-count').textContent = filled + '/9 필드 채움';
}
</script>
