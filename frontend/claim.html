<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>클레임 접수 (1단계) · 납품 불량 클레임 대응 시스템</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #f0f2f5; }
    .page-wrap { max-width: 900px; margin: 0 auto; padding: 32px 24px 60px; }
    .step-bar { display:flex; align-items:center; gap:0; margin-bottom:32px; }
    .step { display:flex; align-items:center; gap:8px; font-size:13px; }
    .step-num { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; }
    .step.active .step-num { background:#0d6b6c; color:#fff; }
    .step.done   .step-num { background:#c8e6c9; color:#2e7d32; }
    .step.wait   .step-num { background:#e0e0e0; color:#999; }
    .step.active .step-label { color:#0d6b6c; font-weight:600; }
    .step.wait   .step-label { color:#aaa; }
    .step-divider { flex:1; height:1px; background:#e0e0e0; margin:0 12px; max-width:60px; }

    .section { background:#fff; border-radius:14px; border:1px solid #e0e0e0; padding:24px; margin-bottom:16px; }
    .section-title { font-size:14px; font-weight:500; color:#2c2c2c; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:8px; }
    .section-title .badge { font-size:10px; padding:2px 7px; border-radius:10px; background:#e8f5f5; color:#0a4e4f; font-weight:500; }
    .fgrid { display:grid; grid-template-columns:1fr 1fr; gap:14px 20px; }
    .fgrid.col3 { grid-template-columns:1fr 1fr 1fr; }
    .fg { display:flex; flex-direction:column; gap:5px; }
    .fg.span2 { grid-column: span 2; }
    .fg label { font-size:12px; color:#666; }
    .fg input, .fg select, .fg textarea {
      padding:9px 11px; border-radius:8px; border:1px solid #e0e0e0;
      font-size:13px; color:#2c2c2c; font-family:inherit; width:100%;
      background:#fff; transition:border-color .15s;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus { outline:none; border-color:#0d6b6c; }
    .fg textarea { resize:vertical; min-height:72px; }
    .required { color:#e53935; margin-left:2px; }

    .upload-area {
      border:1.5px dashed #e0e0e0; border-radius:10px; padding:22px 16px;
      text-align:center; cursor:pointer; background:#fafafa;
      transition:border-color .15s, background .15s;
    }
    .upload-area:hover, .upload-area.has-file { border-color:#0d6b6c; background:#e8f5f5; }
    .upload-text { font-size:13px; color:#888; }
    .upload-hint { font-size:11px; color:#bbb; margin-top:3px; }
    .upload-preview { display:none; margin-top:10px; }
    .upload-preview img { max-width:100%; max-height:150px; border-radius:8px; }
    .upload-filename { font-size:12px; color:#0d6b6c; font-weight:500; margin-top:4px; }

    .ai-box { background:#e8f5f5; border:1px solid #0d6b6c; border-radius:10px; padding:14px 16px; display:none; }
    .ai-box-label { font-size:11px; color:#0a4e4f; margin-bottom:4px; }
    .ai-box-result { font-size:17px; font-weight:500; }
    .ai-box-conf { font-size:12px; color:#888; margin-top:2px; }

    .parse-section { display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap; }
    .parse-left { flex:1; min-width:200px; }
    .parse-right { flex:2; min-width:260px; }
    .parse-status { font-size:12px; color:#666; margin-top:6px; min-height:18px; }

    .next-bar { display:flex; justify-content:flex-end; gap:12px; margin-top:24px; }
    .btn-next {
      padding:12px 32px; background:#0d6b6c; color:#fff; border:none;
      border-radius:10px; font-size:15px; font-weight:500; cursor:pointer;
      transition:background .15s; display:flex; align-items:center; gap:8px;
    }
    .btn-next:hover { background:#0a5a5b; }
    .btn-back-hub { padding:12px 20px; background:#fff; border:1px solid #e0e0e0; border-radius:10px; font-size:14px; cursor:pointer; color:#666; }
    .btn-back-hub:hover { background:#f5f5f5; }
    .defect-tag-wrap { display:flex; flex-wrap:wrap; gap:8px; }
    .dtag {
      padding:7px 18px; border:1.5px solid #e0e0e0; border-radius:20px;
      background:#fafafa; font-size:13px; cursor:pointer; color:#555;
      transition:all .15s; font-family:inherit;
    }
    .dtag:hover  { border-color:#0d6b6c; color:#0d6b6c; }
    .dtag.active { background:#e8f5f5; border-color:#0d6b6c; color:#0d6b6c; font-weight:600; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo-area">
      <img src="logo.png" class="logo-icon" alt="로고" />
      <div>
        <div class="logo-title">납품 불량 클레임 대응 시스템</div>
        <div class="logo-sub">AJIN INDUSTRIAL · QA 관리 시스템</div>
      </div>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-team">품질보증팀</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="page-wrap">

    <!-- 단계 표시 -->
    <div class="step-bar">
      <div class="step active">
        <div class="step-num">1</div>
        <div class="step-label">정보 입력</div>
      </div>
      <div class="step-divider"></div>
      <div class="step wait">
        <div class="step-num">2</div>
        <div class="step-label">보고서 수정 · 유사사례</div>
      </div>
      <div class="step-divider"></div>
      <div class="step wait">
        <div class="step-num">3</div>
        <div class="step-label">다운로드</div>
      </div>
    </div>

    <!-- 문서 파싱 -->
    <div class="section">
      <div class="section-title">📄 문서 자동 파싱 <span class="badge">선택</span></div>
      <div class="parse-section">
        <div class="parse-left">
          <label style="font-size:12px;color:#666;display:block;margin-bottom:6px">PDF / DOCX / EML 업로드</label>
          <div class="upload-area" id="docUploadArea" onclick="document.getElementById('docInput').click()">
            <div class="upload-text">클릭하여 파일 업로드</div>
            <div class="upload-hint">PDF · DOCX · EML</div>
            <div class="upload-filename" id="docFilename"></div>
          </div>
          <input type="file" id="docInput" accept=".pdf,.docx,.eml" style="display:none" onchange="handleDocFile(this)" />
        </div>
        <div class="parse-right">
          <label style="font-size:12px;color:#666;display:block;margin-bottom:6px">클레임 텍스트 (파일 업로드 시 자동 채워짐 · 직접 입력 가능)</label>
          <textarea id="claimRawText" rows="4" style="width:100%;padding:9px 11px;border-radius:8px;border:1px solid #e0e0e0;font-size:13px;font-family:inherit;resize:vertical" placeholder="클레임 내용을 붙여넣거나 파일을 업로드하세요."></textarea>
          <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
            <button class="btn btn-primary" style="padding:8px 18px;font-size:13px" onclick="parseClaimText()">✦ AI 자동 입력</button>
            <div class="parse-status" id="parseStatus"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 기본 정보 -->
    <div class="section">
      <div class="section-title">📋 기본 정보</div>
      <div class="fgrid">
        <div class="fg">
          <label>납품처 (고객사)<span class="required">*</span></label>
          <input type="text" id="customer_name" placeholder="예: 현대자동차" />
        </div>
        <div class="fg">
          <label>접수일자</label>
          <input type="date" id="issue_date" />
        </div>
        <div class="fg">
          <label>납품일자</label>
          <input type="date" id="delivery_date" />
        </div>
        <div class="fg">
          <label>담당자<span class="required">*</span></label>
          <input type="text" id="handler" placeholder="예: 홍길동" />
        </div>
        <div class="fg">
          <label>작성자</label>
          <input type="text" id="author_name" placeholder="예: 김대리" />
        </div>
      </div>
    </div>

    <!-- 제품 정보 -->
    <div class="section">
      <div class="section-title">🔩 제품 정보</div>
      <div class="fgrid">
        <div class="fg">
          <label>품명</label>
          <input type="text" id="product_name" placeholder="예: 자동차 프레임" />
        </div>
        <div class="fg">
          <label>품번</label>
          <input type="text" id="product_no" placeholder="예: FRM-207-102" />
        </div>
        <div class="fg">
          <label>부품명</label>
          <input type="text" id="part_name" placeholder="예: 프레임" />
        </div>
        <div class="fg">
          <label>공정명</label>
          <input type="text" id="process_name" placeholder="예: 조립" />
        </div>
        <div class="fg">
          <label>LOT No</label>
          <input type="text" id="lot_no" placeholder="예: LOT-2605-001" />
        </div>
        <div class="fg">
          <label>납품수량 (EA)</label>
          <input type="number" id="delivery_quantity" placeholder="예: 500" min="0" />
        </div>
        <div class="fg">
          <label>불량수량 (EA)</label>
          <input type="number" id="defect_quantity" placeholder="예: 3" min="0" />
        </div>
      </div>
    </div>

    <!-- 불량 정보 -->
    <div class="section">
      <div class="section-title">⚠️ 불량 정보</div>

      <!-- 불량 유형 태그 선택 -->
      <div style="margin-bottom:16px">
        <label style="font-size:12px;color:#666;display:block;margin-bottom:8px">불량 유형</label>
        <div class="defect-tag-wrap">
          <button type="button" class="dtag" data-val="OUTER_DAMAGE" onclick="pickDefect(this)">외관 손상</button>
          <button type="button" class="dtag" data-val="SEALING"      onclick="pickDefect(this)">실링 불량</button>
          <button type="button" class="dtag" data-val="HEMMING"      onclick="pickDefect(this)">헤밍 불량</button>
          <button type="button" class="dtag" data-val="HOLE_DEFORM"  onclick="pickDefect(this)">홀 변형</button>
        </div>
        <input type="hidden" id="defect_type" />
      </div>

      <div class="fgrid">
        <div class="fg">
          <label>불량 위치</label>
          <input type="text" id="defect_location" placeholder="예: 프레임 측면부" />
        </div>
        <div class="fg">
          <label>불량 코드</label>
          <input type="text" id="defect_code" placeholder="예: M01" />
        </div>
      </div>

      <!-- 불량 사진 + AI 분류 -->
      <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <label style="font-size:12px;color:#666;display:block;margin-bottom:6px">불량 사진 업로드</label>
          <div class="upload-area" id="imgUploadArea" onclick="document.getElementById('imageInput').click()">
            <svg style="width:28px;height:28px;opacity:.3;display:block;margin:0 auto 8px" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <div class="upload-text">클릭하여 이미지 업로드</div>
            <div class="upload-hint">JPG · PNG · 최대 20MB</div>
            <div class="upload-preview" id="imgPreview">
              <img id="previewImg" src="" alt="미리보기" />
              <div class="upload-filename" id="imgFilename"></div>
            </div>
          </div>
          <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImage(this)" />
        </div>
        <div>
          <label style="font-size:12px;color:#666;display:block;margin-bottom:6px">AI 분류 결과</label>
          <div class="ai-box" id="aiBox">
            <div class="ai-box-label">✦ AI 분석 결과</div>
            <div class="ai-box-result" id="aiResult">-</div>
            <div class="ai-box-conf" id="aiConf"></div>
          </div>
          <div style="font-size:12px;color:#bbb;margin-top:8px">이미지를 업로드하면 AI가 불량 유형을 자동으로 분류합니다.</div>
        </div>
      </div>
    </div>

    <textarea id="claim_text" style="display:none"></textarea>

    <!-- 하단 버튼 -->
    <div class="next-bar">
      <button class="btn-back-hub" onclick="location.href='/hub'">← 취소</button>
      <button class="btn-next" onclick="goNext()">다음 단계 — 보고서 작성 →</button>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-left">© 2026 경북대 KDT 12기 · SILI 경진대회</div>
    <div class="footer-status"><span class="status-dot"></span>로컬 서버 연결됨</div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    const DEFECT_LABELS = { 'OUTER_DAMAGE':'외관 손상', 'SEALING':'실링 불량', 'HEMMING':'헤밍 불량', 'HOLE_DEFORM':'홀 변형' };

    function pickDefect(btn) {
      document.querySelectorAll('.dtag').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('defect_type').value = btn.dataset.val;
    }
    function pickDefectByVal(val) {
      const btn = document.querySelector(`.dtag[data-val="${val}"]`);
      if (btn) pickDefect(btn);
    }

    function localDateISO() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user) { location.href = '/'; }
    else {
      document.getElementById('userAvatar').textContent = user.name.charAt(0);
      document.getElementById('userName').textContent   = user.name + ' 담당자';
      document.getElementById('handler').value          = user.name;
      document.getElementById('author_name').value      = user.name;
      document.getElementById('issue_date').value       = localDateISO();
    }
    function doLogout() { sessionStorage.removeItem('user'); location.href = '/'; }

    // 2단계에서 "이전" 눌러 돌아온 경우 — DB에서 기존 데이터 복원
    const _editId = parseInt(new URLSearchParams(location.search).get('id')) || null;
    if (_editId) {
      (async () => {
        const r = await apiFetch('/api/reports/' + _editId);
        if (!r) return;
        const fill = (id, val) => { const el = document.getElementById(id); if (el && val != null && val !== '') el.value = val; };
        fill('customer_name',      r.customer_name);
        fill('handler',            r.handler);
        fill('author_name',        r.author_name);
        fill('issue_date',         (r.issue_date    || '').slice(0, 10));
        fill('delivery_date',      (r.delivery_date || '').slice(0, 10));
        fill('product_name',       r.product_name);
        fill('product_no',         r.product_no);
        fill('part_name',          r.part_name);
        fill('process_name',       r.process_name);
        fill('lot_no',             r.lot_no);
        fill('defect_location',    r.defect_location);
        fill('defect_code',        r.defect_code);
        fill('delivery_quantity',  r.delivery_quantity);
        fill('defect_quantity',    r.defect_quantity);
        fill('claimRawText',       r.extracted_text);
        if (r.defect_type) pickDefectByVal(r.defect_type);
        if (r.images && r.images.length > 0) {
          document.getElementById('previewImg').src            = r.images[0].image_path;
          document.getElementById('imgFilename').textContent   = '기존 이미지';
          document.getElementById('imgPreview').style.display = 'block';
          document.getElementById('imgUploadArea').classList.add('has-file');
        }
      })();
    }

    /* 문서 파일 파싱 */
    async function handleDocFile(input) {
      const file = input.files[0]; if (!file) return;
      document.getElementById('docFilename').textContent = file.name;
      document.getElementById('docUploadArea').classList.add('has-file');
      document.getElementById('parseStatus').textContent = '텍스트 추출 중...';
      const fd = new FormData(); fd.append('file', file);
      const data = await apiFetch('/api/parse-file', { method:'POST', body:fd });
      if (data?.extracted_text) {
        document.getElementById('claimRawText').value = data.extracted_text;
        document.getElementById('parseStatus').textContent = '추출 완료. AI 자동 입력 버튼을 눌러주세요.';
      } else {
        document.getElementById('parseStatus').textContent = '추출 실패. 직접 입력해 주세요.';
      }
    }

    async function parseClaimText() {
      const text = document.getElementById('claimRawText').value.trim();
      if (!text) { alert('클레임 텍스트를 입력하세요.'); return; }
      document.getElementById('parseStatus').textContent = 'AI 분석 중...';
      const data = await apiFetch('/api/parse-claim', {
        method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({ text }),
      });
      if (!data) { document.getElementById('parseStatus').textContent = '파싱 실패. 직접 입력해 주세요.'; return; }
      const fill = (id, val) => { if (val != null && val !== '') document.getElementById(id).value = val; };
      fill('customer_name', data.customer_name);
      fill('handler',       data.handler);
      fill('product_name',  data.product_name);
      fill('delivery_quantity', data.delivery_quantity);
      fill('defect_quantity',   data.defect_quantity);
      if (!document.getElementById('claim_text').value.trim()) {
        const raw = document.getElementById('claimRawText').value.trim();
        if (raw) document.getElementById('claim_text').value = raw;
      }
      if (data.defect_type) pickDefectByVal(data.defect_type);
      document.getElementById('parseStatus').textContent = '✅ 자동 입력 완료. 내용을 검토 후 수정하세요.';
      // 파싱 결과 임시 저장 (step2에서 원인/조치 채우기 위해)
      sessionStorage.setItem('parsedData', JSON.stringify(data));
    }

    /* 이미지 업로드 + AI 분류 */
    async function handleImage(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('imgFilename').textContent = file.name;
        document.getElementById('imgPreview').style.display = 'block';
        document.getElementById('imgUploadArea').classList.add('has-file');
      };
      reader.readAsDataURL(file);
      document.getElementById('aiBox').style.display = 'block';
      document.getElementById('aiResult').textContent = '분석 중...';
      const fd = new FormData(); fd.append('image', file);
      const data = await apiFetch('/api/classify', { method:'POST', body:fd });
      if (data) {
        document.getElementById('aiResult').textContent = data.label;
        document.getElementById('aiConf').textContent = `신뢰도 ${data.confidence_pct}${data.is_dummy?' (시연용)':''}`;
        pickDefectByVal(data.defect_type);
      } else {
        document.getElementById('aiResult').textContent = '분류 실패 — 수동 선택 필요';
      }
    }

    /* Step 2로 이동 — DB에 즉시 저장 후 report_id URL로 이동 */
    async function goNext() {
      const customer = document.getElementById('customer_name').value.trim();
      if (!customer) { alert('납품처(고객사)를 입력하세요.'); document.getElementById('customer_name').focus(); return; }
      const handler = document.getElementById('handler').value.trim();
      if (!handler) { alert('담당자를 입력하세요.'); document.getElementById('handler').focus(); return; }
      const defect = document.getElementById('defect_type').value;
      if (!defect) { alert('불량 유형을 선택하세요.'); return; }

      const btn = document.querySelector('.btn-next');
      btn.disabled = true;
      btn.textContent = '저장 중...';

      try {
        // 2단계에서 돌아온 경우 — 새 보고서 생성 없이 PUT 후 이동
        if (_editId) {
          const saved = await apiFetch('/api/reports/' + _editId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              customer_name:     customer,
              handler:           handler,
              author_name:       document.getElementById('author_name').value.trim(),
              issue_date:        document.getElementById('issue_date').value,
              delivery_date:     document.getElementById('delivery_date').value,
              product_name:      document.getElementById('product_name').value.trim(),
              product_no:        document.getElementById('product_no').value.trim(),
              part_name:         document.getElementById('part_name').value.trim(),
              process_name:      document.getElementById('process_name').value.trim(),
              lot_no:            document.getElementById('lot_no').value.trim(),
              defect_type:       document.getElementById('defect_type').value || undefined,
              defect_location:   document.getElementById('defect_location').value.trim(),
              defect_code:       document.getElementById('defect_code').value.trim(),
              delivery_quantity: parseInt(document.getElementById('delivery_quantity').value) || undefined,
              defect_quantity:   parseInt(document.getElementById('defect_quantity').value)  || undefined,
            }),
          });
          if (!saved) { alert('저장 중 오류가 발생했습니다. 다시 시도해 주세요.'); return; }
          location.href = '/report-draft?id=' + _editId;
          return;
        }

        const aiText  = document.getElementById('aiResult').textContent;
        const aiValid = aiText && aiText !== '-' && aiText !== '분류 실패 — 수동 선택 필요' && aiText !== '분석 중...';
        const parsed  = JSON.parse(sessionStorage.getItem('parsedData') || '{}');

        const fd = new FormData();
        fd.append('customer_name',    customer);
        fd.append('issue_date',       document.getElementById('issue_date').value);
        fd.append('delivery_date',    document.getElementById('delivery_date').value);
        fd.append('handler',          handler);
        fd.append('author_name',      document.getElementById('author_name').value.trim());
        fd.append('product_name',     document.getElementById('product_name').value.trim());
        fd.append('product_no',       document.getElementById('product_no').value.trim());
        fd.append('part_name',        document.getElementById('part_name').value.trim());
        fd.append('process_name',     document.getElementById('process_name').value.trim());
        fd.append('lot_no',           document.getElementById('lot_no').value.trim());
        fd.append('defect_type',      defect);
        fd.append('defect_location',  document.getElementById('defect_location').value.trim());
        fd.append('defect_code',      document.getElementById('defect_code').value.trim());
        fd.append('claim_text',       document.getElementById('claim_text').value.trim());
        fd.append('extracted_text',   document.getElementById('claimRawText').value.trim());
        fd.append('root_cause_analysis', parsed.root_cause_analysis || '');
        fd.append('corrective_action',   parsed.corrective_action   || '');
        fd.append('preventive_action',   parsed.preventive_action   || '');
        if (aiValid && defect) fd.append('ai_defect_type', defect);
        const dq  = document.getElementById('delivery_quantity').value;
        const dfq = document.getElementById('defect_quantity').value;
        if (dq)  fd.append('delivery_quantity', dq);
        if (dfq) fd.append('defect_quantity',   dfq);

        const imageFile = document.getElementById('imageInput').files[0];
        if (imageFile) fd.append('image', imageFile);

        const result = await apiFetch('/api/reports/', { method: 'POST', body: fd });
        if (!result || !result.report_id) { alert('저장 실패. 다시 시도해 주세요.'); return; }

        sessionStorage.removeItem('parsedData');
        location.href = '/report-draft?id=' + result.report_id;
      } catch (err) {
        alert('오류 발생: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '다음 단계 — 보고서 작성 →';
      }
    }
  </script>
</body>
</html>
