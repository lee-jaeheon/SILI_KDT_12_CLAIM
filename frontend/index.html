<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · 납품 불량 클레임 대응 시스템</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 0 24px;
    }
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }
    .login-logo svg {
      width: 52px;
      height: 52px;
      margin-bottom: 14px;
    }
    .login-logo-title {
      font-size: 18px;
      font-weight: 500;
      color: #2c2c2c;
      margin-bottom: 4px;
      text-align: center;
    }
    .login-logo-sub {
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    .login-card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e0e0e0;
      padding: 32px 28px;
    }
    .login-card h2 {
      font-size: 16px;
      font-weight: 500;
      color: #2c2c2c;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #2c2c2c;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus {
      border-color: #0d6b6c;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #0d6b6c;
      color: #2c2c2c;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .login-btn:hover {
      background: #0a5a5b;
    }
    .login-error {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #fdecea;
      border-radius: 8px;
      font-size: 12px;
      color: #c62828;
      text-align: center;
    }
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-logo">
      <img src="logo.png" style="width:64px;height:64px;" alt="로고" />
      <div class="login-logo-title">납품 불량 클레임 대응 시스템</div>
      <div class="login-logo-sub">AJIN INDUSTRIAL · QA 관리 시스템</div>
    </div>

    <div class="login-card">
      <h2>로그인</h2>

      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="username" placeholder="아이디를 입력하세요" />
      </div>

      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요" />
      </div>

      <button class="login-btn" onclick="doLogin()">로그인</button>

      <div class="login-error" id="loginError">
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>
    </div>

    <div class="login-footer">
      © 2026 경북대 KDT 12기 · SILI 경진대회
    </div>
  </div>

  <script>
    const USERS = [
      { id: 'admin', pw: '1234', name: '홍길동', team: '품질보증팀' },
      { id: 'qa01',  pw: '1234', name: '김철수', team: '품질보증팀' },
    ];

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      const id = document.getElementById('username').value.trim();
      const pw = document.getElementById('password').value;
      const user = USERS.find(u => u.id === id && u.pw === pw);
      if (user) {
        sessionStorage.setItem('user', JSON.stringify(user));
        location.href = '/hub';
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }
  </script>
</body>
</html>
