<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다운로드 (3단계) · 납품 불량 클레임 대응 시스템</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    :root {
      --accent: #0d6b6c;
      --accent-bg: #e8f5f5;
      --border: #c8c8c8;
      --text: #1a1d23;
      --sub: #6b7280;
    }
    html, body { height:100%; margin:0; background:#f0f2f5; display:flex; flex-direction:column; }
    .topbar { flex-shrink:0; }
    .footer  { flex-shrink:0; }

    .step-header {
      flex-shrink:0; background:#fff; border-bottom:1px solid #e8e8e8;
      padding:10px 24px; display:flex; align-items:center;
    }
    .step-wrap { display:flex; align-items:center; }
    .step { display:flex; align-items:center; gap:8px; font-size:13px; }
    .step-num { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
    .step.done   .step-num  { background:#c8e6c9; color:#2e7d32; }
    .step.done   .step-label { color:#888; }
    .step.wait   .step-num  { background:#e0e0e0; color:#999; }
    .step.wait   .step-label { color:#aaa; }
    .step.active .step-num  { background:var(--accent); color:#fff; }
    .step.active .step-label { color:var(--accent); font-weight:600; }
    .step-divider { width:48px; height:1px; background:#e0e0e0; margin:0 12px; }

    .panel-wrap { flex:1; overflow-y:auto; padding:24px; max-width:960px; margin:0 auto; width:100%; box-sizing:border-box; }

    .complete-banner { background:#e8f5e9; border:1.5px solid #66bb6a; border-radius:10px; padding:14px 18px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
    .complete-banner .icon { font-size:20px; }
    .complete-banner p { font-size:13px; color:#1b5e20; margin:0; line-height:1.5; }

    .docx-outer { background:#fff; border:1px solid #d0d0d0; border-radius:10px; box-shadow:0 2px 12px rgba(0,0,0,.06); overflow:hidden; margin-bottom:16px; }

    #docx-container {
      padding: 16px;
      min-height: 500px;
    }

    /* docx-preview 내부 스타일 정규화 */
    #docx-container section.docx { box-shadow: 0 2px 12px rgba(0,0,0,.12); margin: 0 auto; background: #fff !important; }
    #docx-container .docx-wrapper { background: #e0e0e0 !important; padding: 20px !important; }
    #docx-container * { color-scheme: light !important; }

    .loading-state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:400px; gap:14px; color:var(--sub);
    }
    .loading-spinner { width:36px; height:36px; border:3px solid #e0e0e0; border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    .error-state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:400px; gap:10px; color:#c62828;
    }
    .error-state .err-icon { font-size:32px; }

    .action-bar { display:flex; justify-content:space-between; align-items:center; padding:16px 0 32px; }
    .btn-ghost { padding:10px 18px; background:#fff; border:1px solid #d0d0d0; border-radius:9px; font-size:13px; cursor:pointer; color:#555; font-family:inherit; }
    .btn-ghost:hover { background:#f5f5f5; }
    .btn-download { padding:12px 32px; background:var(--accent); color:#fff; border:none; border-radius:9px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:8px; }
    .btn-download:hover { background:#0a5a5b; }
    .btn-download:disabled { background:#9ec5c5; cursor:not-allowed; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo-area">
      <img src="logo.png" class="logo-icon" alt="로고" />
      <div>
        <div class="logo-title">납품 불량 클레임 대응 시스템</div>
        <div class="logo-sub">AJIN INDUSTRIAL · QA 관리 시스템</div>
      </div>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-team">품질보증팀</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="step-header">
    <div class="step-wrap">
      <div class="step done"><div class="step-num">✓</div><div class="step-label">정보 입력</div></div>
      <div class="step-divider"></div>
      <div class="step done"><div class="step-num">✓</div><div class="step-label">보고서 수정 · 유사사례</div></div>
      <div class="step-divider"></div>
      <div class="step active"><div class="step-num">3</div><div class="step-label">미리보기 · 다운로드</div></div>
    </div>
  </div>

  <div class="panel-wrap">

    <div class="complete-banner">
      <div class="icon">📋</div>
      <p>최종 보고서를 확인 후 다운로드하세요. 다운로드 시 <strong>처리 완료</strong> 상태로 변경되고 유사 사례 DB에 등록됩니다.</p>
    </div>

    <div class="docx-outer">
      <div id="docx-container">
        <div class="loading-state" id="loadingState">
          <div class="loading-spinner"></div>
          <span>문서를 불러오는 중...</span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-ghost" onclick="goBack()">← 이전</button>
      <div style="display:flex;gap:10px">
        <button class="btn-ghost" onclick="completeAndExit()">완료 후 목록으로</button>
        <button class="btn-download" id="downloadBtn" onclick="downloadReport()">⬇ 다운로드 (.docx)</button>
      </div>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-left">© 2026 경북대 KDT 12기 · SILI 경진대회</div>
    <div class="footer-status"><span class="status-dot"></span>로컬 서버 연결됨</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx-preview@latest/dist/docx-preview.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user) { location.href = '/'; }
    else {
      document.getElementById('userAvatar').textContent = user.name.charAt(0);
      document.getElementById('userName').textContent   = user.name + ' 담당자';
    }
    function doLogout() { sessionStorage.removeItem('user'); location.href = '/'; }

    const urlParams = new URLSearchParams(location.search);
    const reportId  = parseInt(urlParams.get('id'));
    if (!reportId) { location.href = '/list'; }

    function goBack() { location.href = '/report-draft?id=' + reportId; }

    async function loadPreview() {
      const container = document.getElementById('docx-container');
      try {
        const res = await fetch('/api/reports/' + reportId + '/preview');
        if (!res.ok) throw new Error('서버 응답 오류: ' + res.status);
        const blob = await res.blob();

        container.innerHTML = '';
        await docx.renderAsync(blob, container, null, {
          className: 'docx',
          inWrapper: true,
          ignoreWidth: false,
          ignoreHeight: false,
          ignoreFonts: false,
          breakPages: true,
          useBase64URL: true,
          renderHeaders: true,
          renderFooters: true,
          renderFootnotes: true,
        });
      } catch (e) {
        container.innerHTML = `
          <div class="error-state">
            <span class="err-icon">⚠️</span>
            <strong>미리보기를 불러올 수 없습니다.</strong>
            <span style="font-size:12px;color:#888">${e.message}</span>
          </div>`;
      }
    }

    async function setApproved() {
      await apiFetch('/api/reports/' + reportId + '/status', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'approved' }),
      });
    }

    async function completeAndExit() {
      await setApproved();
      location.href = '/list';
    }

    async function downloadReport() {
      const btn = document.getElementById('downloadBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 다운로드 중...';

      try {
        const res = await fetch('/api/reports/' + reportId + '/download');
        if (!res.ok) throw new Error('download failed');
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        const cd   = res.headers.get('Content-Disposition') || '';
        const match = cd.match(/filename\*=UTF-8''(.+)/);
        a.download = match ? decodeURIComponent(match[1]) : 'report.docx';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast('다운로드 완료. 목록으로 이동합니다...');
        setTimeout(() => { location.href = '/list'; }, 1200);
      } catch (e) {
        showToast('다운로드 중 오류가 발생했습니다.');
        btn.disabled = false;
        btn.innerHTML = '⬇ 다운로드 (.docx)';
      }
    }

    loadPreview();
  </script>
</body>
</html>
