<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>품질 사례 DB · 납품 불량 클레임 대응 시스템</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 28px 48px; flex: 1; }
    .page-header { margin-bottom: 28px; }
    .back-btn { font-size: 14px; color: #888; cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 8px; display: block; }
    .back-btn:hover { color: #2c2c2c; }
    .page-title { font-size: 24px; font-weight: 500; color: #2c2c2c; }
    .page-sub { font-size: 14px; color: #888; margin-top: 3px; }

    .search-section { background: #fff; border-radius: 16px; border: 1px solid #e0e0e0; padding: 20px 24px; margin-bottom: 24px; }
    .search-row { display: flex; gap: 12px; align-items: center; }
    .search-wrap { flex: 1; display: flex; align-items: center; gap: 10px; background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 10px; padding: 11px 16px; }
    .search-wrap input { border: none; background: transparent; font-size: 15px; color: #2c2c2c; outline: none; width: 100%; font-family: inherit; }
    .filter-select { padding: 11px 14px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; color: #555; background: #fff; outline: none; cursor: pointer; font-family: inherit; }

    .cases-stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .cases-stat { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
    .cases-stat-val { font-size: 22px; font-weight: 500; color: #0d6b6c; }
    .cases-stat-label { font-size: 13px; color: #888; }
    .defect-filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .defect-filter-tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; background: #fff; color: #888; transition: all .15s; font-family: inherit; }
    .defect-filter-tab.active { background: #0d6b6c; color: #fff; border-color: #0d6b6c; }

    .cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 900px) { .cases-grid { grid-template-columns: repeat(2, 1fr); } }
    .case-card { background: #fff; border-radius: 14px; border: 1px solid #e0e0e0; padding: 20px; cursor: pointer; transition: all .15s; }
    .case-card:hover { border-color: #0d6b6c; box-shadow: 0 4px 20px rgba(13,107,108,.08); transform: translateY(-2px); }
    .case-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .case-card-num { font-size: 12px; color: #bbb; font-family: monospace; }
    .case-card-date { font-size: 12px; color: #bbb; }
    .case-card-company { font-size: 15px; font-weight: 500; color: #2c2c2c; margin-bottom: 8px; }
    .case-card-type { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-bottom: 12px; }
    .type-OUTER_DAMAGE     { background: #ffe8e8; color: #c0392b; }
    .type-SEALING          { background: #e8f0ff; color: #1a4fa0; }
    .type-HEMMING          { background: #fff3e0; color: #a06010; }
    .type-HOLE_DEFORM      { background: #e8f5e9; color: #1e6e3e; }
    .type-GAP_DEFECT       { background: #f3e8ff; color: #7b2d8b; }
    .type-FASTENING_DEFECT { background: #e8f8ff; color: #006f9e; }
    .type-default          { background: #f0f0f0; color: #555; }
    .case-card-preview { font-size: 13px; color: #666; line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
    .case-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
    .case-card-product { font-size: 12px; color: #aaa; }
    .case-card-arrow { font-size: 14px; color: #0d6b6c; font-weight: 500; }
    .cases-empty { grid-column: 1/-1; text-align: center; padding: 60px; color: #bbb; font-size: 15px; }
    .cases-loading { grid-column: 1/-1; text-align: center; padding: 60px; color: #aaa; font-size: 15px; }

    .modal { background: #f0f2f5; border-radius: 16px; width: 100%; max-width: 780px; max-height: 90vh; overflow-y: auto; padding: 24px 28px; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .modal-title { font-size: 16px; font-weight: 500; color: #2c2c2c; }
    .modal-sub { font-size: 12px; color: #888; margin-top: 3px; }
    .modal-close { background: none; border: none; font-size: 24px; color: #aaa; cursor: pointer; padding: 0; line-height: 1; }
    .modal-close:hover { color: #2c2c2c; }

    /* NCR 보고서 양식 */
    .ncr-wrap { background: #fff; border: 1px solid #c8c8c8; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .ncr-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .ncr-wrap td, .ncr-wrap th { border: 1px solid #c8c8c8; padding: 7px 10px; vertical-align: middle; }
    .ncr-header { display: flex; border-bottom: 1px solid #c8c8c8; }
    .ncr-logo-cell { width: 80px; padding: 12px; border-right: 1px solid #c8c8c8; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ncr-logo-cell img { width: 56px; height: 56px; object-fit: contain; }
    .ncr-title-cell { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #1a1d23; border-right: 1px solid #c8c8c8; }
    .ncr-docno-cell { width: 130px; padding: 10px; display: flex; flex-direction: column; justify-content: center; }
    .ncr-docno-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .ncr-docno-val { font-size: 13px; font-weight: 600; color: #0d6b6c; }
    .ncr-th { background: #f5f5f5; font-weight: 600; color: #333; text-align: center; width: 90px; }
    .ncr-defect-row td { padding: 10px; }
    .ncr-checkbox { display: inline-flex; align-items: center; gap: 5px; margin-right: 16px; font-size: 13px; }
    .ncr-photo-cell { height: 180px; text-align: center; vertical-align: middle; background: #fafafa; }
    .ncr-photo-cell img { max-height: 170px; max-width: 100%; object-fit: contain; border-radius: 6px; }
    .ncr-photo-cell .no-photo { color: #ccc; font-size: 13px; }
    .ncr-text-cell { background: #fff; line-height: 1.6; color: #333; min-height: 60px; }

    /* 통계 페이지는 위쪽 여백 더 넉넉하게 (Lee 의도값) */
    .main { padding-top: 170px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo-area">
      <img src="logo.png" class="logo-icon" alt="로고" />
      <div>
        <div class="logo-title">납품 불량 클레임 대응 시스템</div>
        <div class="logo-sub">AJIN INDUSTRIAL · QA 관리 시스템</div>
      </div>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">홍</div>
      <div>
        <div class="user-name" id="userName">홍길동 담당자</div>
        <div class="user-team">품질보증팀</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="page-wrap">

    <div class="page-header">
      <div>
        <button class="back-btn" onclick="location.href='/hub'">← 홈으로</button>
        <div class="page-title">통계 분석 · 품질 사례 DB</div>
        <div class="page-sub">처리 완료된 클레임 사례를 검색하고 참고할 수 있습니다</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchCasesTab('stats', this)">통계 분석</button>
      <button class="tab" onclick="switchCasesTab('cases', this)">사례 목록</button>
    </div>

    <!-- 사례 목록 탭 (기본 표시) -->
    <div id="tab-cases" style="display:none;">
      <div class="search-section">
        <div class="search-row">
          <div class="search-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input id="searchInput" placeholder="납품처, 품명, 원인, 대책 키워드 검색..." oninput="filterCases()" />
          </div>
          <select class="filter-select" id="filterDefect" onchange="filterCases()">
            <option value="">전체 유형</option>
            <option value="OUTER_DAMAGE">외관 손상</option>
            <option value="SEALING">실링 불량</option>
            <option value="HEMMING">헤밍 불량</option>
            <option value="HOLE_DEFORM">홀 변형</option>
            <option value="GAP_DEFECT">간격 불량</option>
            <option value="FASTENING_DEFECT">체결 불량</option>
          </select>
        </div>
      </div>
      <div class="cases-stats">
        <div class="cases-stat">
          <div class="cases-stat-val" id="statTotal">-</div>
          <div class="cases-stat-label">전체 사례</div>
        </div>
        <div class="cases-stat">
          <div class="cases-stat-val" id="statFiltered">-</div>
          <div class="cases-stat-label">검색 결과</div>
        </div>
        <div style="flex:1;"></div>
        <div class="defect-filter-tabs">
          <button class="defect-filter-tab active" onclick="setDefectTab('', this)">전체</button>
          <button class="defect-filter-tab" onclick="setDefectTab('OUTER_DAMAGE', this)">외관 손상</button>
          <button class="defect-filter-tab" onclick="setDefectTab('SEALING', this)">실링 불량</button>
          <button class="defect-filter-tab" onclick="setDefectTab('HEMMING', this)">헤밍 불량</button>
          <button class="defect-filter-tab" onclick="setDefectTab('HOLE_DEFORM', this)">홀 변형</button>
          <button class="defect-filter-tab" onclick="setDefectTab('GAP_DEFECT', this)">간격 불량</button>
          <button class="defect-filter-tab" onclick="setDefectTab('FASTENING_DEFECT', this)">체결 불량</button>
        </div>
      </div>
      <div class="cases-grid" id="casesGrid">
        <div class="cases-loading">사례를 불러오는 중...</div>
      </div>
    </div>

    <!-- 통계 분석 탭 (숨김) -->
    <div id="tab-stats">
      <div style="background:#fff;border-radius:16px;border:1px solid #e0e0e0;padding:28px 32px;margin-bottom:20px;">

        <!-- 컨트롤 헤더 -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
          <div style="font-size:17px;font-weight:500;color:#2c2c2c;">클레임 통계 분석</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="display:flex;gap:6px;">
              <button class="defect-filter-tab active" onclick="switchPeriod('monthly', this)">월별</button>
              <button class="defect-filter-tab" onclick="switchPeriod('quarterly', this)">분기별</button>
              <button class="defect-filter-tab" onclick="switchPeriod('yearly', this)">연별</button>
            </div>
            <select class="filter-select" id="yearSelect" onchange="rerenderStats()"></select>
          </div>
        </div>

        <!-- 요약 수치 -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;" id="statSummaryCards"></div>

        <!-- Top 3 -->
        <div style="margin-bottom:24px;">
          <div style="font-size:13px;font-weight:500;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;">주요 불량 유형 Top 3</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;" id="topDefects"></div>
        </div>

        <!-- 차트 1행: 기간별 추이 + 유형별 비율 -->
        <div style="display:grid;grid-template-columns:3fr 2fr;gap:20px;margin-bottom:20px;align-items:stretch;">
          <div style="background:#f8f9fa;border-radius:12px;padding:20px 24px;">
            <div style="font-size:14px;font-weight:500;color:#2c2c2c;margin-bottom:16px;" id="periodChartTitle">월별 클레임 접수 현황</div>
            <canvas id="periodChart" height="100"></canvas>
            <div id="insightBox" style="margin-top:16px;background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:14px 18px;font-size:13px;color:#555;line-height:1.8;"></div>
          </div>
          <div style="background:#f8f9fa;border-radius:12px;padding:20px 24px;display:flex;flex-direction:column;align-items:center;height:100%;box-sizing:border-box;">
            <div style="font-size:14px;font-weight:500;color:#2c2c2c;margin-bottom:16px;width:100%;">불량 유형별 비율</div>
            <canvas id="defectChart" style="max-width:220px;max-height:250px;margin-top:30px;"></canvas>
          </div>
        </div>

        <!-- 차트 2행: 납품처별 현황 -->
        <div style="background:#f8f9fa;border-radius:12px;padding:20px 24px;">
          <div style="font-size:14px;font-weight:500;color:#2c2c2c;margin-bottom:16px;">납품처별 클레임 현황 Top 8</div>
          <canvas id="supplierChart" height="60"></canvas>
        </div>

      </div>
    </div>

  </div><!-- /page-wrap -->

  <!-- 상세 모달 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-sub" id="modalSub"></div>
        </div>
        <button class="modal-close" onclick="closeModalDirect()">x</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-left">© 2026 경북대 KDT 12기 · SILI 경진대회</div>
    <div class="footer-status"><span class="status-dot"></span>로컬 서버 연결됨 · DB 정상</div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    const DEFECT_LABELS = {
      'OUTER_DAMAGE': '외관 손상', 'SEALING': '실링 불량',
      'HEMMING': '헤밍 불량',     'HOLE_DEFORM': '홀 변형',
      'GAP_DEFECT': '간격 불량',  'FASTENING_DEFECT': '체결 불량',
    };
    const DEFECT_TYPE_CLASS = {
      'OUTER_DAMAGE': 'type-OUTER_DAMAGE', 'SEALING': 'type-SEALING',
      'HEMMING': 'type-HEMMING',           'HOLE_DEFORM': 'type-HOLE_DEFORM',
      'GAP_DEFECT': 'type-GAP_DEFECT',     'FASTENING_DEFECT': 'type-FASTENING_DEFECT',
    };

    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user?.token) { location.href = '/'; }
    else {
      document.getElementById('userAvatar').textContent = user.name.charAt(0);
      document.getElementById('userName').textContent = user.name + ' 담당자';
    }
    function doLogout() { sessionStorage.removeItem('user'); location.href = '/'; }

    let allCases = [];

    async function loadCases() {
      const data = await apiFetch('/api/reports/?status=approved&limit=100');
      if (data && data.items) {
        allCases = data.items.map(item => ({
          id:           item.report_id,
          num:          item.document_no || `#${String(item.report_id).padStart(4,'0')}`,
          date:         (item.received_date || '').slice(0, 10),
          supplier:     item.customer_name || '-',
          defect_type:  item.defect_type || '',
          product_name: item.product_name || '',
          defect_location: item.defect_location || '',
          root_cause:   item.root_cause_analysis || '',
          action:       item.corrective_action   || '',
          prevention:   item.preventive_action   || '',
          handler:      item.handler || '-',
          image_path:   item.images?.[0]?.image_path || null,
          delivery_date: item.delivery_date || '',
          delivery_quantity: item.delivery_quantity || '',
          defect_quantity:   item.defect_quantity   || '',
        }));
        allCases.sort((a, b) => new Date(b.date) - new Date(a.date));
      }
      document.getElementById('statTotal').textContent = allCases.length;
      filterCases();
      updateYearSelect('monthly');
      renderStats('monthly');
    }

    let periodChartInst = null, defectChartInst = null, supplierChartInst = null, currentPeriod = 'monthly';

    function switchCasesTab(name, btn) {
      document.getElementById('tab-cases').style.display = name === 'cases' ? 'block' : 'none';
      document.getElementById('tab-stats').style.display = name === 'stats' ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      if (name === 'stats') {
        currentPeriod = 'monthly';
        document.querySelectorAll('#tab-stats .defect-filter-tab').forEach((t,i) => t.classList.toggle('active', i===0));
        updateYearSelect('monthly');
        renderStats('monthly');
      }
    }

    function switchPeriod(period, btn) {
      document.querySelectorAll('#tab-stats .defect-filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = period;
      updateYearSelect(period);
      renderStats(period);
    }

    function rerenderStats() { renderStats(currentPeriod); }

    function updateYearSelect(period) {
      const sel = document.getElementById('yearSelect');
      if (period === 'yearly') { sel.style.display = 'none'; return; }
      sel.style.display = 'block';
      const years = [...new Set(allCases.map(c => c.date.slice(0,4)))].sort().reverse();
      const cur = sel.value;
      sel.innerHTML = years.map(y => `<option value="${y}">${y}년</option>`).join('');
      if (years.includes(cur)) sel.value = cur;
    }

    function renderStats(period) {
      // ── 요약 카드 ──
      const supplierSet = new Set(allCases.map(c => c.supplier).filter(Boolean));
      const typeCounts = {};
      allCases.forEach(c => {
        const label = DEFECT_LABELS[c.defect_type] || c.defect_type;
        if (label) typeCounts[label] = (typeCounts[label] || 0) + 1;
      });
      const topType = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0];
      document.getElementById('statSummaryCards').innerHTML = `
        <div style="background:#e8f5f5;border-radius:12px;border:1px solid #0d6b6c;padding:18px 20px;">
          <div style="font-size:12px;color:#0a4e4f;margin-bottom:6px;">완료 사례 수</div>
          <div style="font-size:26px;font-weight:500;color:#0d6b6c;">${allCases.length}건</div>
        </div>
        <div style="background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:18px 20px;">
          <div style="font-size:12px;color:#888;margin-bottom:6px;">납품처 수</div>
          <div style="font-size:26px;font-weight:500;color:#2c2c2c;">${supplierSet.size}곳</div>
        </div>
        <div style="background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:18px 20px;">
          <div style="font-size:12px;color:#888;margin-bottom:6px;">불량 유형 수</div>
          <div style="font-size:26px;font-weight:500;color:#2c2c2c;">${Object.keys(typeCounts).length}종</div>
        </div>
        <div style="background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:18px 20px;">
          <div style="font-size:12px;color:#888;margin-bottom:6px;">최다 불량 유형</div>
          <div style="font-size:16px;font-weight:500;color:#2c2c2c;margin-top:4px;">${topType ? topType[0] : '-'}</div>
          <div style="font-size:12px;color:#888;margin-top:4px;">${topType ? topType[1]+'건' : ''}</div>
        </div>`;

      // ── Top 3 ──
      const sorted = Object.entries(typeCounts).sort((a,b) => b[1]-a[1]);
      const rankBg = ['#0d6b6c','#4a9fa0','#8cbcbc'];
      document.getElementById('topDefects').innerHTML = sorted.slice(0,3).map((t,i) => `
        <div style="background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:16px;display:flex;align-items:center;gap:12px;">
          <div style="width:30px;height:30px;border-radius:50%;background:${rankBg[i]};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;">${i+1}</div>
          <div><div style="font-size:14px;font-weight:500;color:#2c2c2c;">${t[0]}</div><div style="font-size:13px;color:#888;">${t[1]}건</div></div>
        </div>`).join('') || '<div style="color:#bbb;font-size:13px;padding:8px;">데이터 없음</div>';

      // ── 기간별 차트 ──
      const selectedYear = document.getElementById('yearSelect').value;
      let pdLabels, pdData, pdTitle;
      if (period === 'monthly') {
        pdTitle = (selectedYear ? selectedYear+'년 ' : '') + '월별 클레임 접수 현황';
        const counts = {};
        for (let m=1; m<=12; m++) counts[String(m).padStart(2,'0')] = 0;
        allCases.filter(c => !selectedYear || c.date.slice(0,4) === selectedYear)
                .forEach(c => { const k=c.date.slice(5,7); counts[k]=(counts[k]||0)+1; });
        pdLabels = Object.keys(counts).sort().map(k => parseInt(k)+'월');
        pdData   = Object.keys(counts).sort().map(k => counts[k]);
      } else if (period === 'quarterly') {
        pdTitle = (selectedYear ? selectedYear+'년 ' : '') + '분기별 현황';
        const counts = {'Q1':0,'Q2':0,'Q3':0,'Q4':0};
        allCases.filter(c => !selectedYear || c.date.slice(0,4) === selectedYear)
                .forEach(c => { const q='Q'+Math.ceil(parseInt(c.date.slice(5,7))/3); counts[q]=(counts[q]||0)+1; });
        pdLabels = Object.keys(counts); pdData = Object.values(counts);
      } else {
        pdTitle = '연별 클레임 접수 현황';
        const counts = {};
        allCases.forEach(c => { const k=c.date.slice(0,4); counts[k]=(counts[k]||0)+1; });
        const keys = Object.keys(counts).sort();
        pdLabels = keys.map(k => k+'년'); pdData = keys.map(k => counts[k]);
      }
      document.getElementById('periodChartTitle').textContent = pdTitle;

      // ── 인사이트 ──
      const topSupplier = Object.entries(
        allCases.reduce((acc, c) => { if(c.supplier) acc[c.supplier]=(acc[c.supplier]||0)+1; return acc; }, {})
      ).sort((a,b)=>b[1]-a[1])[0];

      let insightHTML = '';
      if (period === 'monthly') {
        const yearCases = allCases.filter(c => !selectedYear || c.date.slice(0,4) === selectedYear);
        const total = yearCases.length;
        const avg = total > 0 ? (total / 12).toFixed(1) : 0;
        const monthlyCounts = {};
        yearCases.forEach(c => { const m=c.date.slice(5,7); monthlyCounts[m]=(monthlyCounts[m]||0)+1; });
        const peakEntry = Object.entries(monthlyCounts).sort((a,b)=>b[1]-a[1])[0];
        insightHTML =
          `📅 ${selectedYear||'전체'}년 총 클레임 <strong>${total}건</strong> · 월 평균 <strong>${avg}건</strong><br>` +
          `⚠ 주요 불량: <strong>${topType ? topType[0] : '-'}</strong> (${topType ? topType[1]+'건' : '-'})<br>` +
          `📈 최다 접수월: <strong>${peakEntry ? parseInt(peakEntry[0])+'월' : '-'}</strong> (${peakEntry ? peakEntry[1]+'건' : '-'})`;
      } else if (period === 'quarterly') {
        const yearCases = allCases.filter(c => !selectedYear || c.date.slice(0,4) === selectedYear);
        const total = yearCases.length;
        const qCounts = {'Q1':0,'Q2':0,'Q3':0,'Q4':0};
        yearCases.forEach(c => { const q='Q'+Math.ceil(parseInt(c.date.slice(5,7))/3); qCounts[q]++; });
        const peakQ = Object.entries(qCounts).sort((a,b)=>b[1]-a[1])[0];
        insightHTML =
          `📅 ${selectedYear||'전체'}년 총 클레임 <strong>${total}건</strong><br>` +
          `⚠ 주요 불량: <strong>${topType ? topType[0] : '-'}</strong> (${topType ? topType[1]+'건' : '-'})<br>` +
          `📈 최다 접수 분기: <strong>${peakQ ? peakQ[0] : '-'}</strong> (${peakQ ? peakQ[1]+'건' : '-'})`;
      } else {
        const yearCounts = {};
        allCases.forEach(c => { const y=c.date.slice(0,4); if(y) yearCounts[y]=(yearCounts[y]||0)+1; });
        const peakYear = Object.entries(yearCounts).sort((a,b)=>b[1]-a[1])[0];
        insightHTML =
          `📅 전체 기간 누적 클레임 <strong>${allCases.length}건</strong><br>` +
          `⚠ 주요 불량: <strong>${topType ? topType[0] : '-'}</strong> (${topType ? topType[1]+'건' : '-'})<br>` +
          `📈 클레임 최다 연도: <strong>${peakYear ? peakYear[0]+'년' : '-'}</strong> (${peakYear ? peakYear[1]+'건' : '-'})`;
      }
      document.getElementById('insightBox').innerHTML = insightHTML;


      if (periodChartInst) periodChartInst.destroy();
      periodChartInst = new Chart(document.getElementById('periodChart'), {
        type: 'bar',
        data: { labels: pdLabels, datasets: [{ label:'클레임 수', data: pdData, backgroundColor:'#0d6b6c', borderRadius:6 }] },
        options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } } } }
      });

      if (defectChartInst) defectChartInst.destroy();
      defectChartInst = new Chart(document.getElementById('defectChart'), {
        type: 'doughnut',
        data: {
          labels: sorted.map(t=>t[0]),
          datasets: [{ data: sorted.map(t=>t[1]), backgroundColor:['#0d6b6c','#4a9fa0','#f59e42','#6fa8f5'], borderWidth:2, borderColor:'#fff' }]
        },
        options: { responsive:true, cutout:'60%', plugins:{ legend:{ position:'bottom',  align:'start', labels:{ padding:16, font:{ size:13 } } } } }
      });

      // ── 납품처별 차트 ──
      const supplierCounts = {};
      allCases.forEach(c => {
        if (c.supplier) supplierCounts[c.supplier] = (supplierCounts[c.supplier] || 0) + 1;
      });
      const supSorted = Object.entries(supplierCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
      if (supplierChartInst) supplierChartInst.destroy();
      supplierChartInst = new Chart(document.getElementById('supplierChart'), {
        type: 'bar',
        data: {
          labels: supSorted.map(s=>s[0]),
          datasets: [{ label:'클레임 수', data: supSorted.map(s=>s[1]),
            backgroundColor: supSorted.map((_,i) => i===0?'#0d6b6c':i===1?'#4a9fa0':'#8cbcbc'),
            borderRadius: 6 }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          plugins: { legend: { display:false } },
          scales: { x: { beginAtZero:true, ticks:{ stepSize:1 } } }
        }
      });
    }

    function setDefectTab(code, btn) {
      document.querySelectorAll('#tab-cases .defect-filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('filterDefect').value = code;
      filterCases();
    }

    function filterCases() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const defect  = document.getElementById('filterDefect').value;
      const filtered = allCases.filter(c => {
        const matchDefect  = !defect || c.defect_type === defect;
        const matchKeyword = !keyword || [
          c.supplier, c.product_name, c.root_cause, c.action, c.prevention,
          DEFECT_LABELS[c.defect_type] || '', c.defect_location
        ].some(v => v.toLowerCase().includes(keyword));
        return matchDefect && matchKeyword;
      });
      document.getElementById('statFiltered').textContent = filtered.length;
      renderGrid(filtered);
    }

    function renderGrid(cases) {
      const grid = document.getElementById('casesGrid');
      if (!cases.length) { grid.innerHTML = '<div class="cases-empty">검색 결과가 없습니다.</div>'; return; }
      grid.innerHTML = cases.map(c => `
        <div class="case-card" onclick="openModal(${c.id})">
          <div class="case-card-header">
            <span class="case-card-num">${c.num}</span>
            <span class="case-card-date">${c.date}</span>
          </div>
          <div class="case-card-company">${c.supplier}</div>
          <div class="case-card-type ${DEFECT_TYPE_CLASS[c.defect_type] || 'type-default'}">${DEFECT_LABELS[c.defect_type] || c.defect_type}</div>
          <div class="case-card-preview">${c.root_cause ? `<b>원인:</b> ${c.root_cause}` : '<span style="color:#ccc;">원인 분석 없음</span>'}</div>
          <div class="case-card-footer">
            <span class="case-card-product">${c.product_name || '품명 미입력'}</span>
            <span class="case-card-arrow">자세히 →</span>
          </div>
        </div>`).join('');
    }

    function openModal(id) {
      const c = allCases.find(x => x.id === id);
      if (!c) return;
      document.getElementById('modalTitle').textContent = `부적합 보고서 (NCR)`;
      document.getElementById('modalSub').textContent = `${c.num} · ${c.date} · 담당자: ${c.handler}`;

      const defects = ['OUTER_DAMAGE','SEALING','HEMMING','HOLE_DEFORM','GAP_DEFECT','FASTENING_DEFECT'];
      const defectKo = {'OUTER_DAMAGE':'외관손상','SEALING':'실링 불량','HEMMING':'헤밍 불량','HOLE_DEFORM':'홀 변형','GAP_DEFECT':'간격 불량','FASTENING_DEFECT':'체결 불량'};
      const checkboxes = defects.map(d =>
        `<span class="ncr-checkbox">${d === c.defect_type ? '☑' : '□'} ${defectKo[d]}</span>`
      ).join('');

      document.getElementById('modalBody').innerHTML = `
        <div class="ncr-wrap">
          <div class="ncr-header">
            <div class="ncr-logo-cell"><img src="logo.png" alt="로고" /></div>
            <div class="ncr-title-cell">부적합 보고서(NCR)</div>
            <div class="ncr-docno-cell">
              <div class="ncr-docno-label">문서번호</div>
              <div class="ncr-docno-val">${c.num || '-'}</div>
            </div>
          </div>
          <table>
            <tr>
              <td class="ncr-th">발행일</td>
              <td>${c.date || '-'}</td>
              <td class="ncr-th">고객사</td>
              <td>${c.supplier || '-'}</td>
            </tr>
            <tr>
              <td class="ncr-th">납품일</td>
              <td>${c.delivery_date || '-'}</td>
              <td class="ncr-th">납품수량</td>
              <td>${c.delivery_quantity ? c.delivery_quantity + ' EA' : '-'}</td>
            </tr>
            <tr>
              <td class="ncr-th">품명/품번</td>
              <td colspan="3">${c.product_name || '-'}</td>
            </tr>
            <tr>
              <td class="ncr-th">불량수량</td>
              <td>${c.defect_quantity ? c.defect_quantity + ' EA' : '-'}</td>
              <td class="ncr-th">불량위치</td>
              <td>${c.defect_location || '-'}</td>
            </tr>
            <tr class="ncr-defect-row">
              <td class="ncr-th">불량유형</td>
              <td colspan="3">${checkboxes}</td>
            </tr>
            <tr>
              <td class="ncr-th">사진첨부</td>
              <td colspan="3" class="ncr-photo-cell">
                ${c.image_path
                  ? `<img src="${c.image_path}" alt="불량 사진" />`
                  : `<div class="no-photo">첨부된 사진이 없습니다</div>`}
              </td>
            </tr>
            <tr>
              <td class="ncr-th">원인분석</td>
              <td colspan="3" class="ncr-text-cell">${c.root_cause || '-'}</td>
            </tr>
            <tr>
              <td class="ncr-th">시정조치</td>
              <td colspan="3" class="ncr-text-cell">${c.action || '-'}</td>
            </tr>
            <tr>
              <td class="ncr-th">예방대책</td>
              <td colspan="3" class="ncr-text-cell">${c.prevention || '-'}</td>
            </tr>
            <tr>
              <td class="ncr-th">담당자</td>
              <td colspan="3">${c.handler || '-'}</td>
            </tr>
          </table>
        </div>`;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
    function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }

    loadCases();
  </script>
</body>
</html>
