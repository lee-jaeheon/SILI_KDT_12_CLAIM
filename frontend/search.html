<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유사 사례 목록 · 납품 불량 클레임 대응 시스템</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .page-wrap { max-width:1100px; margin:0 auto; padding:32px 28px 48px; flex:1; }
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; }
    .back-btn { display:flex; align-items:center; gap:6px; font-size:13px; color:#888; cursor:pointer; background:none; border:none; padding:0; margin-bottom:8px; }
    .back-btn:hover { color:#2c2c2c; }
    .page-title { font-size:22px; font-weight:500; color:#2c2c2c; }
    .page-sub   { font-size:13px; color:#888; margin-top:3px; }

    .search-bar { background:#fff; border:1px solid #e0e0e0; border-radius:14px; padding:20px 24px; margin-bottom:20px; }
    .search-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .search-input-wrap { flex:1; min-width:220px; display:flex; align-items:center; gap:8px; background:#f8f8f8; border:1px solid #e0e0e0; border-radius:8px; padding:9px 14px; }
    .search-input-wrap input { border:none; background:transparent; font-size:13px; color:#2c2c2c; outline:none; width:100%; }
    .filter-select { padding:9px 12px; border:1px solid #e0e0e0; border-radius:8px; font-size:13px; color:#555; background:#fff; outline:none; cursor:pointer; font-family:inherit; }
    .filter-date-wrap { display:flex; align-items:center; gap:6px; }
    .filter-date-wrap input[type="date"] { padding:8px 10px; border:1px solid #e0e0e0; border-radius:8px; font-size:13px; color:#555; background:#fff; outline:none; font-family:inherit; }
    .filter-date-wrap span { font-size:13px; color:#aaa; }
    .btn-search { padding:9px 20px; background:#0d6b6c; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; white-space:nowrap; }
    .btn-search:hover { background:#0a5a5b; }
    .btn-reset { padding:9px 14px; background:#fff; color:#888; border:1px solid #e0e0e0; border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit; }
    .btn-reset:hover { background:#f5f5f5; }

    .result-meta { font-size:13px; color:#888; margin-bottom:14px; }
    .result-meta strong { color:#2c2c2c; }

    .case-list { display:flex; flex-direction:column; gap:12px; }
    .case-card { background:#fff; border:1px solid #e0e0e0; border-radius:14px; padding:20px 22px; cursor:pointer; transition:box-shadow .15s, border-color .15s; }
    .case-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); border-color:#0d6b6c; }
    .cc-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .cc-title { font-size:15px; font-weight:600; color:#2c2c2c; }
    .cc-meta  { font-size:12px; color:#888; margin-top:3px; }
    .cc-badges { display:flex; gap:6px; flex-wrap:wrap; flex-shrink:0; }
    .badge { display:inline-flex; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; white-space:nowrap; }
    .badge-defect    { background:#e8f5f5; color:#0a4e4f; border:1px solid #b2dfdb; }
    .badge-approved  { background:#c8e6c9; color:#1b5e20; }
    .cc-body { display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; }
    .cc-field-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:#aaa; margin-bottom:3px; }
    .cc-field-value { font-size:12.5px; color:#2c2c2c; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
    .cc-field-value.empty { color:#bbb; font-style:italic; }
    .cc-divider { height:1px; background:#f0f0f0; margin:12px 0; }

    .empty-state { text-align:center; color:#bbb; padding:64px 24px; }
    .empty-state .es-icon { font-size:40px; margin-bottom:14px; }
    .empty-state p { font-size:14px; margin:0; }
    .loading-state { display:flex; align-items:center; gap:10px; color:#888; font-size:13px; padding:48px 0; justify-content:center; }
    .spinner { width:18px; height:18px; border:2px solid #e0e0e0; border-top-color:#0d6b6c; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* 상세 모달 */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:16px; width:100%; max-width:680px; max-height:88vh; overflow-y:auto; padding:28px 32px; box-shadow:0 20px 60px rgba(0,0,0,.15); }
    .modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
    .modal-title { font-size:17px; font-weight:500; color:#2c2c2c; }
    .modal-sub { font-size:12px; color:#888; margin-top:3px; }
    .modal-close { background:none; border:none; font-size:24px; color:#aaa; cursor:pointer; padding:0; line-height:1; }
    .modal-close:hover { color:#2c2c2c; }
    .modal-section { margin-bottom:20px; }
    .modal-section-title { font-size:13px; font-weight:500; color:#2c2c2c; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid #f0f0f0; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .info-label { font-size:11px; color:#888; margin-bottom:2px; }
    .info-value { font-size:13px; color:#2c2c2c; font-weight:500; white-space:pre-wrap; }
    .img-preview { width:100%; max-height:200px; object-fit:cover; border-radius:10px; margin-top:10px; }
    .img-placeholder { width:100%; height:80px; background:#f5f5f5; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#ccc; font-size:13px; margin-top:10px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo-area">
      <img src="logo.png" class="logo-icon" alt="로고" />
      <div>
        <div class="logo-title">납품 불량 클레임 대응 시스템</div>
        <div class="logo-sub">AJIN INDUSTRIAL · QA 관리 시스템</div>
      </div>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="userAvatar"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-team">품질보증팀</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <button class="back-btn" onclick="location.href='/hub'">← 홈으로</button>
        <div class="page-title">유사 사례 목록</div>
        <div class="page-sub">처리 완료된 클레임이 유사 사례 DB로 등록됩니다</div>
      </div>
    </div>

    <!-- 검색/필터 -->
    <div class="search-bar">
      <div class="search-row">
        <div class="search-input-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="searchInput" placeholder="납품처, 품명, 불량유형, 원인, 대책 내용 검색..." oninput="renderList()" />
        </div>
        <select class="filter-select" id="filterDefect" onchange="renderList()">
          <option value="">전체 불량유형</option>
          <option value="OUTER_DAMAGE">외관 손상</option>
          <option value="SEALING">실링 불량</option>
          <option value="HEMMING">헤밍 불량</option>
          <option value="HOLE_DEFORM">홀 변형</option>
        </select>
        <div class="filter-date-wrap">
          <input type="date" id="filterFrom" onchange="renderList()" />
          <span>~</span>
          <input type="date" id="filterTo" onchange="renderList()" />
        </div>
        <button class="btn-reset" onclick="resetFilters()">초기화</button>
      </div>
    </div>

    <div class="result-meta" id="resultMeta"></div>
    <div class="case-list" id="caseList">
      <div class="loading-state"><div class="spinner"></div>유사 사례 로딩 중...</div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-left">© 2026 경북대 KDT 12기 · SILI 경진대회</div>
    <div class="footer-status"><span class="status-dot"></span>로컬 서버 연결됨</div>
  </footer>

  <!-- 상세 모달 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-sub"  id="modalSub"></div>
        </div>
        <button class="modal-close" onclick="closeModalDirect()">×</button>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">기본 정보</div>
        <div class="info-grid" id="modalInfo"></div>
        <div id="modalImage"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">원인 분석 및 대책</div>
        <div id="modalAnalysis"></div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    const DEFECT_LABELS = { 'OUTER_DAMAGE':'외관 손상', 'SEALING':'실링 불량', 'HEMMING':'헤밍 불량', 'HOLE_DEFORM':'홀 변형' };

    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user) { location.href = '/'; }
    else {
      document.getElementById('userAvatar').textContent = user.name.charAt(0);
      document.getElementById('userName').textContent   = user.name + ' 담당자';
    }
    function doLogout() { sessionStorage.removeItem('user'); location.href = '/'; }

    let allCases = [];

    async function loadCases() {
      const data = await apiFetch('/api/reports/?status=approved&limit=500');
      allCases = (data && data.items) ? data.items : [];
      renderList();
    }

    function resetFilters() {
      document.getElementById('searchInput').value  = '';
      document.getElementById('filterDefect').value = '';
      document.getElementById('filterFrom').value   = '';
      document.getElementById('filterTo').value     = '';
      renderList();
    }

    function renderList() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const defect  = document.getElementById('filterDefect').value;
      const from    = document.getElementById('filterFrom').value;
      const to      = document.getElementById('filterTo').value;

      const filtered = allCases.filter(c => {
        const date = (c.received_date || c.issue_date || '').slice(0, 10);
        if (defect && c.defect_type !== defect) return false;
        if (from   && date < from) return false;
        if (to     && date > to)   return false;
        if (keyword) {
          const haystack = [
            c.customer_name, c.product_name, c.part_name,
            DEFECT_LABELS[c.defect_type] || c.defect_type,
            c.defect_location, c.root_cause_analysis,
            c.corrective_action, c.preventive_action, c.claim_text,
          ].join(' ').toLowerCase();
          if (!haystack.includes(keyword)) return false;
        }
        return true;
      });

      const meta = document.getElementById('resultMeta');
      meta.innerHTML = `전체 <strong>${allCases.length}</strong>건 중 <strong>${filtered.length}</strong>건`;

      const container = document.getElementById('caseList');
      if (!filtered.length) {
        container.innerHTML = `<div class="empty-state"><div class="es-icon">🔍</div><p>조건에 맞는 유사 사례가 없습니다.</p></div>`;
        return;
      }

      container.innerHTML = '';
      filtered.forEach(c => {
        const defectLabel = DEFECT_LABELS[c.defect_type] || c.defect_type || '—';
        const date = (c.received_date || c.issue_date || '').slice(0, 10);
        const card = document.createElement('div');
        card.className = 'case-card';
        card.innerHTML = `
          <div class="cc-head">
            <div>
              <div class="cc-title">${escHtml(c.customer_name || '—')}</div>
              <div class="cc-meta">#${c.report_id} · ${date} · ${escHtml(c.product_name || c.part_name || '품명 미기재')}</div>
            </div>
            <div class="cc-badges">
              <span class="badge badge-defect">${escHtml(defectLabel)}</span>
              <span class="badge badge-approved">처리 완료</span>
            </div>
          </div>
          <div class="cc-divider"></div>
          <div class="cc-body">
            <div>
              <div class="cc-field-label">원인 분석</div>
              <div class="cc-field-value${c.root_cause_analysis ? '' : ' empty'}">${c.root_cause_analysis ? escHtml(c.root_cause_analysis) : '미작성'}</div>
            </div>
            <div>
              <div class="cc-field-label">시정 조치</div>
              <div class="cc-field-value${c.corrective_action ? '' : ' empty'}">${c.corrective_action ? escHtml(c.corrective_action) : '미작성'}</div>
            </div>
          </div>`;
        card.onclick = () => openModal(c);
        container.appendChild(card);
      });
    }

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function field(label, val) {
      return `<div><div class="info-label">${label}</div><div class="info-value">${escHtml(val || '—')}</div></div>`;
    }
    function fieldFull(label, val) {
      return `<div style="grid-column:1/-1"><div class="info-label">${label}</div><div class="info-value">${escHtml(val || '—')}</div></div>`;
    }

    function openModal(c) {
      const defectLabel = DEFECT_LABELS[c.defect_type] || c.defect_type || '—';
      const date = (c.received_date || c.issue_date || '').slice(0, 10);
      document.getElementById('modalTitle').textContent = `#${c.report_id} · ${c.customer_name || '—'}`;
      document.getElementById('modalSub').textContent   = `${date} · ${defectLabel}`;
      document.getElementById('modalInfo').innerHTML = `
        ${field('납품처',   c.customer_name)}
        ${field('담당자',   c.handler)}
        ${field('불량유형', defectLabel)}
        ${field('불량위치', c.defect_location)}
        ${field('품명',     c.product_name)}
        ${field('부품명',   c.part_name)}
        ${field('공정명',   c.process_name)}
        ${field('접수일자', date)}
        ${fieldFull('클레임 내용', c.claim_text)}
      `;
      document.getElementById('modalImage').innerHTML = (c.images && c.images.length)
        ? `<img class="img-preview" src="${c.images[0].image_path}" alt="불량 사진" />`
        : `<div class="img-placeholder">불량 사진 없음</div>`;
      document.getElementById('modalAnalysis').innerHTML = `
        <div class="info-grid">
          ${fieldFull('원인 분석', c.root_cause_analysis)}
          ${fieldFull('시정 조치', c.corrective_action)}
          ${fieldFull('재발 방지', c.preventive_action)}
        </div>
      `;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
    function closeModalDirect() { document.getElementById('modalOverlay').classList.remove('open'); }

    loadCases();
  </script>
</body>
</html>
